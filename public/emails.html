<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮件线索管理 - 智拓客</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#030303; --card:rgba(255,255,255,0.03); --card2:rgba(255,255,255,0.05);
    --bd:rgba(255,255,255,0.08); --bd2:rgba(255,255,255,0.12);
    --tx:#e5e7eb; --tx2:rgba(255,255,255,0.6); --tx3:rgba(255,255,255,0.38);
    --ac:#6366f1; --ac2:#818cf8;
    --crawl:#f59e0b; --crawlbg:rgba(245,158,11,0.12);
    --filt:#fbbf24;  --filtbg:rgba(251,191,36,0.12);
    --write:#22d3ee; --writebg:rgba(34,211,238,0.12);
    --send:#818cf8;  --sendbg:rgba(99,102,241,0.14);
    --done:#34d399;  --donebg:rgba(52,211,153,0.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; }
  .hd{ padding:26px 30px 12px; }
  .hd h1{ font-size:1.35rem; font-weight:800; }
  .hd p{ font-size:.82rem; color:var(--tx3); margin-top:5px; }

  /* 顶部：全部产品的待办任务汇总 */
  .banner{ margin:6px 30px 0; border-radius:12px; padding:12px 16px; font-size:.85rem;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; border:1px solid var(--bd); background:var(--card); }
  .banner .bt{ font-size:.72rem; font-weight:800; color:var(--tx3); letter-spacing:.1em; }
  .pill{ display:inline-flex; align-items:center; gap:6px; font-weight:700; padding:4px 10px; border-radius:8px; font-size:.82rem; }
  .pill i{ font-size:15px; }
  .pill.filt{ color:var(--filt); background:var(--filtbg); }
  .pill.write{ color:var(--write); background:var(--writebg); }
  .pill.send{ color:var(--send); background:var(--sendbg); }
  .pill.done{ color:var(--done); background:var(--donebg); }
  .banner .allclear{ color:var(--done); font-weight:700; }

  .wrap{ display:flex; gap:18px; padding:14px 30px 40px; align-items:flex-start; }
  .col{ flex-shrink:0; }
  .cats{ width:270px; } .tasksCol{ flex:1; min-width:0; }
  .col-h{ font-size:.66rem; font-weight:800; color:var(--tx3); letter-spacing:.12em;
    text-transform:uppercase; padding:6px 8px 10px; }

  /* 产品项 */
  .item{ display:flex; align-items:flex-start; gap:10px; padding:11px 12px; border-radius:10px;
    border:1px solid transparent; cursor:pointer; margin-bottom:4px; transition:.15s; }
  .item:hover{ background:var(--card); }
  .item.on{ background:rgba(99,102,241,0.12); border-color:rgba(99,102,241,0.3); }
  .item .ci{ width:30px; height:30px; border-radius:8px; background:var(--card2); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:var(--ac2); font-size:14px; margin-top:1px; }
  .item .nm{ font-size:.83rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .item .meta{ min-width:0; flex:1; }
  .item .tsum{ font-size:.68rem; color:var(--tx3); margin-top:5px; }
  .item .tsum b{ color:var(--tx2); font-weight:700; }
  .item .tsum.clear{ color:var(--done); }

  /* 任务行（每次爬的 = 一个任务 = 一个状态） */
  .task{ display:flex; align-items:center; gap:14px; padding:16px 18px; margin-bottom:10px;
    background:var(--card); border:1px solid var(--bd); border-radius:14px; transition:.15s; }
  .task:hover{ border-color:var(--bd2); }
  .task.taskdone{ opacity:.5; }
  .st{ flex-shrink:0; font-size:.78rem; font-weight:800; padding:6px 12px; border-radius:9px; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
  .st i{ font-size:15px; }
  .st.crawl{ color:var(--crawl); background:var(--crawlbg); }
  .st.tofilter{ color:var(--filt); background:var(--filtbg); }
  .st.towrite{ color:var(--write); background:var(--writebg); }
  .st.tosend{ color:var(--send); background:var(--sendbg); }
  .st.done{ color:var(--done); background:var(--donebg); }
  .task .info{ flex:1; min-width:0; }
  .task .tt{ font-size:.95rem; font-weight:700; }
  .task .td{ font-size:.74rem; color:var(--tx3); margin-top:3px; }
  .bcont{ flex-shrink:0; font-family:inherit; font-size:.82rem; font-weight:700; color:#fff;
    background:linear-gradient(135deg,#6366f1,#4f46e5); border:none; border-radius:9px; padding:9px 16px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .bcont:hover{ filter:brightness(1.08); } .bcont i{ font-size:15px; }

  .empty{ padding:60px 20px; text-align:center; color:var(--tx3); font-size:.85rem; }
  .empty i{ font-size:34px; display:block; margin-bottom:12px; opacity:.5; }
  .empty.clear i{ color:var(--done); opacity:.8; }
  .spin{ display:inline-block; width:16px; height:16px; border:2px solid var(--bd2);
    border-top-color:var(--ac2); border-radius:50%; animation:sp .7s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  @media(max-width:900px){ .wrap{ flex-wrap:wrap; } .cats,.tasksCol{ width:100%; } }
</style>
</head>
<body>
  <div class="hd">
    <h1>邮件线索管理</h1>
    <p>每一次爬的 = 一个任务。只显示还没做完的：卡在哪一步一眼看到，点「继续处理」接着干。</p>
  </div>
  <div class="banner" id="banner" style="display:none"></div>
  <div class="wrap">
    <div class="col cats">
      <div class="col-h">产品</div>
      <div id="catList"><div class="item"><span class="spin"></span></div></div>
    </div>
    <div class="col tasksCol">
      <div class="col-h">待办任务（每次爬的分开）</div>
      <div id="taskList"><div class="empty">← 先选一个产品</div></div>
    </div>
  </div>

<script>
  function getStoredToken(){
    const s = localStorage.getItem('leadgen_supabase_session');
    if (s){ try{ const o = JSON.parse(s); if(o && o.access_token) return o.access_token; }catch(e){} }
    const t = localStorage.getItem('leadgen_accessToken');
    return (t && t.trim()) ? t.trim() : '';
  }
  const token = getStoredToken();
  if (!token){ location.replace('/login.html?redirect=' + encodeURIComponent('/emails.html')); }
  function authHeaders(){ return { Authorization:'Bearer '+token }; }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function hasEmail(l){ return !!((l.email1_subject && String(l.email1_subject).trim()) || (l.email1_body && String(l.email1_body).trim())); }
  function passedFilter(v){ v=String(v==null?'':v).trim().toLowerCase(); if(v==='pass')return true; if(v==='fail')return false; const n=parseFloat(v); if(!isNaN(n))return n>=5; return null; }
  function fmtDT(raw){ if(!raw) return '未知时间'; try{ const d=new Date(/[zZ]$|[+-]\d{2}:?\d{2}$/.test(raw)?raw:raw+'Z'); const p=n=>String(n).padStart(2,'0'); return (d.getMonth()+1)+'月'+d.getDate()+'日 '+p(d.getHours())+':'+p(d.getMinutes()); }catch(e){ return '未知时间'; } }
  function goSearch(sid, stage){ try{ window.parent.postMessage({ type:'console-open-search', searchId:String(sid), goto:String(stage||'') }, '*'); }catch(e){} }

  // 一个批次(每次爬的)的单一状态 = 它卡在哪一步。
  // 判定：这批只要有任何"筛过/写过/发过"的痕迹，就算已处理过；完全没痕迹 = 待筛选。
  // （未爬完暂时测不出来——数据库没记爬取完成标记；以后加了标记再支持。）
  const STAGE = { tofilter:{lbl:'待筛选', icon:'ti-filter',       cls:'tofilter', hint:'爬完了还没筛，去筛一遍'},
                  towrite: {lbl:'待写邮件', icon:'ti-pencil',      cls:'towrite',  hint:'筛过通过了，还没写开发信'},
                  tosend:  {lbl:'待发送',  icon:'ti-mail-forward', cls:'tosend',   hint:'邮件写好了，还没发出去'},
                  done:    {lbl:'已完成',  icon:'ti-checks',       cls:'done',     hint:'写完也发完了'} };
  function batchStage(leads){
    let sent=0, written=0, verdict=0, passNoEmail=0;
    leads.forEach(l=>{
      const w = hasEmail(l), v = passedFilter(l.icp_score);
      if (l.email_sent_at) sent++;
      if (w) written++;
      if (v!==null) verdict++;
      if (v===true && !w) passNoEmail++;
    });
    const processed = verdict>0 || written>0 || sent>0;   // 有任何处理痕迹
    const unsentWritten = written - sent;
    if (!processed) return 'tofilter';       // 爬完没动过 → 待筛选
    if (unsentWritten>0) return 'tosend';    // 有写好没发的 → 优先待发送
    if (passNoEmail>0) return 'towrite';     // 没有待发、但有筛过没写的 → 待写
    return 'done';                            // 写的都发了、没有待写 → 已完成
  }

  let _pipeCache = {};   // pid -> {leads, searches}
  let _productList = [];

  async function loadCats(){
    const box = document.getElementById('catList');
    try{
      const r = await fetch('/api/products', { headers: authHeaders() });
      const d = await r.json();
      _productList = d.profiles || [];
      if (!_productList.length){ box.innerHTML = '<div class="empty" style="padding:24px 6px"><i class="ti ti-package"></i>还没有产品</div>'; return; }
      box.innerHTML = _productList.map((p,i)=>
        '<div class="item'+(i===0?' on':'')+'" data-id="'+esc(p.id)+'" data-name="'+esc(p.name)+'">'
        + '<div class="ci"><i class="ti ti-package"></i></div>'
        + '<div class="meta"><div class="nm">'+(esc(p.name)||'未命名')+'</div>'
        + '<div class="tsum" id="ts-'+esc(p.id)+'">加载中…</div></div></div>').join('');
      box.querySelectorAll('.item').forEach(el=> el.addEventListener('click', ()=>{
        box.querySelectorAll('.item').forEach(x=>x.classList.remove('on')); el.classList.add('on');
        selectProduct(el.dataset.id, el.dataset.name);
      }));
      selectProduct(_productList[0].id, _productList[0].name);
      _productList.forEach(p=> loadPipe(p.id).then(()=>{ updateProdSummary(p.id); renderAggregate(); }).catch(()=>{}));
    }catch(e){ box.innerHTML = '<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
  }

  async function loadPipe(pid){
    if (_pipeCache[pid]) return _pipeCache[pid];
    const r = await fetch('/api/products/'+encodeURIComponent(pid)+'/pipeline', { headers: authHeaders() });
    const d = await r.json();
    if(!d.success) throw new Error(d.error||'加载失败');
    _pipeCache[pid] = { leads: d.leads||[], searches: d.searches||[] };
    return _pipeCache[pid];
  }

  // 把一个产品的线索按批次分组，算每批的单一状态
  function batchesOf(pid){
    const pipe = _pipeCache[pid]; if(!pipe) return [];
    const meta = {}; (pipe.searches||[]).forEach(s=> meta[String(s.id)] = s);
    const g = {};
    (pipe.leads||[]).forEach(l=>{ const k=String(l.search_id||'__none__'); (g[k]=g[k]||[]).push(l); });
    const arr = Object.keys(g).map(k=>{
      const leads=g[k], m=meta[k]||{};
      const ts = m.created_at || (leads[0]&&leads[0].created_at) || null;
      return { key:k, ts, count:leads.length, stage:batchStage(leads) };
    });
    arr.sort((a,b)=> (new Date(b.ts||0)) - (new Date(a.ts||0)));
    return arr;
  }

  // 统计一个产品各阶段的"待办任务数"（批次数）
  function stageCounts(pid){
    const c = { tofilter:0, towrite:0, tosend:0, done:0 };
    batchesOf(pid).forEach(b=> c[b.stage]++);
    return c;
  }

  function updateProdSummary(pid){
    const el = document.getElementById('ts-'+pid); if(!el) return;
    const c = stageCounts(pid);
    const pending = c.tofilter + c.towrite + c.tosend;
    if (!batchesOf(pid).length){ el.className='tsum'; el.textContent='还没爬到线索'; return; }
    if (pending===0){ el.className='tsum clear'; el.innerHTML='<i class="ti ti-circle-check"></i> 都处理完了'; return; }
    const parts=[];
    if(c.tofilter) parts.push('待筛 <b>'+c.tofilter+'</b>');
    if(c.towrite)  parts.push('待写 <b>'+c.towrite+'</b>');
    if(c.tosend)   parts.push('待发 <b>'+c.tosend+'</b>');
    if(c.done)     parts.push('<span style="color:var(--done)">已完成 '+c.done+'</span>');
    el.className='tsum'; el.innerHTML = parts.join(' · ') + ' 批';
  }

  function renderAggregate(){
    const loaded = _productList.filter(p=> _pipeCache[p.id]);
    if (loaded.length < _productList.length) return;
    let t={tofilter:0,towrite:0,tosend:0,done:0};
    loaded.forEach(p=>{ const c=stageCounts(p.id); t.tofilter+=c.tofilter; t.towrite+=c.towrite; t.tosend+=c.tosend; t.done+=c.done; });
    const b = document.getElementById('banner');
    const pending = t.tofilter+t.towrite+t.tosend;
    let html = '<span class="bt">全部产品 · 待办任务</span>';
    if (!pending){ html += '<span class="allclear"><i class="ti ti-circle-check"></i> 全部处理完了</span>'; }
    else {
      if(t.tofilter) html += '<span class="pill filt"><i class="ti ti-filter"></i>'+t.tofilter+' 批待筛选</span>';
      if(t.towrite)  html += '<span class="pill write"><i class="ti ti-pencil"></i>'+t.towrite+' 批待写邮件</span>';
      if(t.tosend)   html += '<span class="pill send"><i class="ti ti-mail-forward"></i>'+t.tosend+' 批待发送</span>';
    }
    if(t.done) html += '<span class="pill done"><i class="ti ti-checks"></i>'+t.done+' 批已完成</span>';
    b.innerHTML = html; b.style.display = 'flex';
  }

  async function selectProduct(pid, pname){
    const box = document.getElementById('taskList');
    box.innerHTML = '<div class="empty"><span class="spin"></span></div>';
    try{ await loadPipe(pid); }
    catch(e){ box.innerHTML = '<div class="empty">加载失败：'+esc(e.message)+'</div>'; return; }
    updateProdSummary(pid);
    const all = batchesOf(pid);
    if (!all.length){
      box.innerHTML = '<div class="empty"><i class="ti ti-inbox"></i>这个产品还没爬到线索<br><span style="font-size:.78rem">去「邮件获客」搜一批客户回来</span></div>';
      return;
    }
    // 待办在前（按时间），已完成排在最后（灰、无按钮）
    const pending = all.filter(b=> b.stage!=='done');
    const done    = all.filter(b=> b.stage==='done');
    box.innerHTML = pending.concat(done).map(b=>{
      const s = STAGE[b.stage];
      const isDone = b.stage==='done';
      return '<div class="task'+(isDone?' taskdone':'')+'">'
        + '<span class="st '+s.cls+'"><i class="ti '+s.icon+'"></i>'+s.lbl+'</span>'
        + '<div class="info"><div class="tt">'+fmtDT(b.ts)+' · '+b.count+' 条线索</div>'
        + (s.hint?('<div class="td">'+s.hint+'</div>'):'')+'</div>'
        + (!isDone && b.key!=='__none__' ? '<button class="bcont" onclick="goSearch(\''+esc(b.key)+'\',\''+b.stage+'\')"><i class="ti ti-player-play"></i> 继续处理</button>' : '')
        + '</div>';
    }).join('');
  }

  if (token) loadCats();
</script>
</body>
</html>
