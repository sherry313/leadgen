<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品管理 - 智拓客</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#030303; --card:rgba(255,255,255,0.03); --card2:rgba(255,255,255,0.05);
    --bd:rgba(255,255,255,0.08); --bd2:rgba(255,255,255,0.12);
    --tx:#e5e7eb; --tx2:rgba(255,255,255,0.6); --tx3:rgba(255,255,255,0.38);
    --ac:#6366f1; --ac2:#818cf8; --ok:#34d399; --danger:#f87171;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; }
  .hd{ padding:26px 30px 6px; display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; }
  .hd .tt h1{ font-size:1.35rem; font-weight:800; }
  .hd .tt p{ font-size:.82rem; color:var(--tx3); margin-top:5px; }
  .hd .add{ margin-left:auto; font-size:.82rem; font-weight:600; color:#fff; background:var(--ac);
    border:none; border-radius:10px; padding:10px 18px; cursor:pointer; font-family:inherit; display:inline-flex; gap:7px; align-items:center; }
  .hd .add:hover{ background:#4f46e5; }
  .grid{ padding:18px 30px 44px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .prod{ background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:18px; position:relative; }
  .prod.active{ border-color:rgba(52,211,153,0.4); }
  .prod .ico{ width:38px; height:38px; border-radius:10px; background:var(--card2); color:var(--ac2);
    display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:12px; }
  .prod .nm{ font-size:.98rem; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .prod .st{ font-size:.74rem; color:var(--tx3); margin-top:4px; }
  .prod .badge{ position:absolute; top:16px; right:16px; font-size:.62rem; font-weight:800; color:var(--ok);
    background:rgba(52,211,153,0.12); border-radius:5px; padding:2px 8px; }
  .prod .acts{ display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
  .b{ font-size:.76rem; border-radius:8px; padding:7px 12px; cursor:pointer; font-family:inherit;
    border:1px solid var(--bd2); background:none; color:var(--tx2); display:inline-flex; align-items:center; gap:5px; }
  .b:hover{ background:var(--card2); color:#fff; }
  .b.use{ color:#fff; background:var(--ac); border-color:var(--ac); }
  .b.use:hover{ background:#4f46e5; }
  .b.del{ color:var(--danger); border-color:rgba(248,113,113,0.3); margin-left:auto; }
  .b.del:hover{ background:rgba(248,113,113,0.1); }
  .empty{ padding:70px 20px; text-align:center; color:var(--tx3); font-size:.88rem; }
  .empty i{ font-size:36px; display:block; margin-bottom:12px; opacity:.5; }
  .spin{ display:inline-block; width:16px; height:16px; border:2px solid var(--bd2);
    border-top-color:var(--ac2); border-radius:50%; animation:sp .7s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#16171c;
    border:1px solid var(--bd2); border-radius:10px; padding:11px 18px; font-size:.82rem; z-index:200;
    display:none; box-shadow:0 8px 30px rgba(0,0,0,0.4); }
</style>
</head>
<body>
  <div class="hd">
    <div class="tt"><h1>产品管理</h1><p>每个产品是一份业务信息档案 · 写邮件时「使用」它,AI 就按这个产品写</p></div>
    <button class="add" onclick="addProduct()"><i class="ti ti-plus"></i> 保存当前为新产品</button>
  </div>
  <div class="grid" id="grid"><div class="empty"><span class="spin"></span></div></div>
  <div class="toast" id="toast"></div>

<script>
  const APP_BI_KEY = 'appBusinessInfo';
  const ACTIVE_KEY = 'leadgen_active_product';
  function getStoredToken(){
    const s = localStorage.getItem('leadgen_supabase_session');
    if (s){ try{ const o = JSON.parse(s); if(o && o.access_token) return o.access_token; }catch(e){} }
    const t = localStorage.getItem('leadgen_accessToken');
    return (t && t.trim()) ? t.trim() : '';
  }
  const token = getStoredToken();
  if (!token){ location.replace('/login.html?redirect=' + encodeURIComponent('/products.html')); }
  function authHeaders(extra){ return Object.assign({ Authorization:'Bearer '+token }, extra||{}); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',1900); }
  function activeId(){ try{ return (JSON.parse(localStorage.getItem(ACTIVE_KEY))||{}).id || null; }catch(e){ return null; } }

  let _products = [];
  async function load(){
    try{
      const r = await fetch('/api/products', { headers: authHeaders() });
      const d = await r.json();
      _products = d.profiles || [];
    }catch(e){ document.getElementById('grid').innerHTML = '<div class="empty">加载失败：'+esc(e.message)+'</div>'; return; }
    render();
  }
  function render(){
    const act = activeId();
    if (!_products.length){
      document.getElementById('grid').innerHTML = '<div class="empty"><i class="ti ti-package"></i>还没有产品<br><span style="font-size:.76rem">去「邮件获客」填一次业务信息,或点右上角「保存当前为新产品」</span></div>';
      return;
    }
    document.getElementById('grid').innerHTML = _products.map(p=>{
      const on = String(p.id)===String(act);
      const n = p.customers || 0;
      const hs = (p.data && p.data.hsCode) || '';
      return '<div class="prod'+(on?' active':'')+'">'
        + (on?'<span class="badge">使用中</span>':'')
        + '<div class="ico"><i class="ti ti-package"></i></div>'
        + '<div class="nm">'+(esc(p.name)||'未命名产品')+'</div>'
        + '<div class="st">客户 '+n+' 位</div>'
        + '<div class="st">HS 编码: '+(hs?('<b style="color:var(--ac2)">'+esc(hs)+'</b>'):'<span style="color:var(--tx3)">未设置</span>')+'</div>'
        + '<div class="acts">'
        + (on?'<button class="b" disabled style="opacity:.5">使用中</button>':'<button class="b use" onclick="useProduct(\''+esc(p.id)+'\')"><i class="ti ti-check"></i> 使用</button>')
        + '<button class="b" onclick="setHs(\''+esc(p.id)+'\')"><i class="ti ti-barcode"></i> HS 编码</button>'
        + '<button class="b" onclick="renameProduct(\''+esc(p.id)+'\')"><i class="ti ti-edit"></i> 改名</button>'
        + '<button class="b del" onclick="delProduct(\''+esc(p.id)+'\')"><i class="ti ti-trash"></i> 删除</button>'
        + '</div></div>';
    }).join('');
  }

  function useProduct(id){
    const p = _products.find(x=>String(x.id)===String(id)); if(!p) return;
    try{
      localStorage.setItem(APP_BI_KEY, JSON.stringify(p.data||{}));
      localStorage.setItem(ACTIVE_KEY, JSON.stringify({ id:p.id, name:p.name }));
    }catch(e){}
    render(); toast('已设为使用中 · 去「邮件获客」写邮件就用这个产品');
  }

  async function renameProduct(id){
    const p = _products.find(x=>String(x.id)===String(id)); if(!p) return;
    const name = prompt('新的产品名称:', p.name||''); if(name==null) return;
    const trimmed = name.trim(); if(!trimmed){ toast('名称不能为空'); return; }
    try{
      const r = await fetch('/api/products/'+encodeURIComponent(id), { method:'PATCH', headers: authHeaders({'Content-Type':'application/json'}), body: JSON.stringify({ name: trimmed }) });
      const d = await r.json(); if(!d.success) throw new Error(d.error||'改名失败');
      p.name = trimmed; render(); toast('已改名');
    }catch(e){ toast('改名失败：'+e.message); }
  }

  async function delProduct(id){
    if(!confirm('删除这个产品?(它的客户表记录不受影响)')) return;
    try{
      const r = await fetch('/api/products/'+encodeURIComponent(id), { method:'DELETE', headers: authHeaders() });
      const d = await r.json(); if(!d.success) throw new Error(d.error||'删除失败');
      _products = _products.filter(x=>String(x.id)!==String(id)); render(); toast('已删除');
    }catch(e){ toast('删除失败：'+e.message); }
  }

  async function setHs(id){
    const p = _products.find(x=>String(x.id)===String(id)); if(!p) return;
    const cur = (p.data && p.data.hsCode) || '';
    toast('AI 正在推荐 HS 编码…');
    let suggest = cur, note = '';
    try{
      const desc = (p.data && p.data.product) || p.name || '';
      const r = await fetch('/api/recommend-hs', { method:'POST', headers: authHeaders({'Content-Type':'application/json'}), body: JSON.stringify({ product: desc }) });
      const d = await r.json();
      if(d.success && d.hsCode){ suggest = d.hsCode; note = d.note||''; }
    }catch(e){}
    const val = prompt('海关编码 HS'+(note?('（AI 推荐:'+note+'）'):'')+'\n可修改后确定；清空则不设:', suggest);
    if(val==null) return;
    const hs = val.trim();
    try{
      const newData = Object.assign({}, p.data||{}, { hsCode: hs });
      const r = await fetch('/api/products/'+encodeURIComponent(id), { method:'PATCH', headers: authHeaders({'Content-Type':'application/json'}), body: JSON.stringify({ data: newData }) });
      const d2 = await r.json(); if(!d2.success) throw new Error(d2.error||'保存失败');
      p.data = newData; render(); toast(hs?('HS 编码已保存: '+hs):'HS 编码已清空');
    }catch(e){ toast('保存失败：'+e.message); }
  }

  async function addProduct(){
    let bi = {};
    try{ bi = JSON.parse(localStorage.getItem(APP_BI_KEY)||'{}'); }catch(e){}
    if(!bi || !bi.product){
      alert('当前没有可保存的业务信息。\n请先到「邮件获客」填写业务信息(产品、卖家、目标客户),再回来点「保存当前为新产品」。');
      return;
    }
    const name = prompt('给这个产品起个名字:', (bi.product||'').slice(0,30) || '我的产品');
    if(name==null) return;
    const trimmed = name.trim(); if(!trimmed){ toast('名称不能为空'); return; }
    try{
      const r = await fetch('/api/products', { method:'POST', headers: authHeaders({'Content-Type':'application/json'}), body: JSON.stringify({ name: trimmed, data: bi }) });
      const d = await r.json(); if(!d.success) throw new Error(d.error||'保存失败');
      try{ localStorage.setItem(ACTIVE_KEY, JSON.stringify({ id:d.profile.id, name:trimmed })); }catch(e){}
      _products.unshift({ ...d.profile, customers:0 }); render(); toast('已保存并设为使用中');
    }catch(e){ toast('保存失败：'+e.message); }
  }

  if (token) load();
</script>
</body>
</html>
