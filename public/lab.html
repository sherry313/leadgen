<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>智拓客 · 工具</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#030303; --panel:#0a0a0c; --card:rgba(255,255,255,0.03); --card2:rgba(255,255,255,0.05);
    --bd:rgba(255,255,255,0.08); --bd2:rgba(255,255,255,0.12);
    --tx:#e5e7eb; --tx2:rgba(255,255,255,0.6); --tx3:rgba(255,255,255,0.35);
    --ac:#6366f1; --ac2:#818cf8; --acbg:rgba(99,102,241,0.14); --ok:#34d399; --okbg:rgba(52,211,153,0.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx); font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; -webkit-font-smoothing:antialiased; line-height:1.55; }
  .wrap{ max-width:860px; margin:0 auto; padding:0 22px 80px; }
  .top-in{ padding:16px 22px; display:flex; align-items:center; gap:11px; max-width:860px; margin:0 auto; border-bottom:1px solid var(--bd); }
  .brand{ display:flex; align-items:center; gap:9px; font-weight:700; font-size:15px; }
  .brand .logo{ width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,var(--ac),#a5b4fc); display:flex; align-items:center; justify-content:center; color:#fff; }
  .hero{ padding:34px 0 6px; }
  .hero h1{ font-size:25px; font-weight:650; letter-spacing:-.01em; }
  .hero p{ color:var(--tx2); font-size:14px; margin-top:9px; }
  .cards{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:24px; }
  @media(max-width:640px){ .cards{ grid-template-columns:1fr; } }
  .card{ background:var(--card); border:1px solid var(--bd); border-radius:15px; padding:24px; transition:.15s; text-decoration:none; color:inherit; display:block; }
  .card:hover{ border-color:var(--ac); background:var(--acbg); transform:translateY(-3px); }
  .card .ci{ width:46px; height:46px; border-radius:12px; background:var(--acbg); color:var(--ac2); display:flex; align-items:center; justify-content:center; font-size:24px; }
  .card:hover .ci{ background:var(--ac); color:#fff; }
  .card h3{ font-size:18px; font-weight:650; margin-top:15px; display:flex; align-items:center; gap:8px; }
  .card .ready{ font-size:10.5px; color:var(--ok); background:var(--okbg); border:1px solid rgba(52,211,153,.3); padding:2px 8px; border-radius:99px; font-weight:600; }
  .card p{ font-size:13px; color:var(--tx2); margin-top:10px; }
  .card .go{ margin-top:16px; font-size:13px; font-weight:600; color:var(--ac2); display:flex; align-items:center; gap:6px; }
  .sep{ margin-top:34px; font-size:12.5px; color:var(--tx3); }
  .sep a{ color:var(--ac2); text-decoration:none; }
  .foot{ text-align:center; color:var(--tx3); font-size:12px; padding:36px 0 0; }
</style>

<div class="top-in">
  <div class="brand"><span class="logo"><i class="ti ti-bolt"></i></span> 智拓客 · 工具</div>
</div>

<div class="wrap">
  <div class="hero">
    <h1>报价 + 海关数据</h1>
    <p>都在本地跑、连真实数据,点开直接用。</p>
  </div>

  <div class="cards">
    <a class="card" href="/customs-lens.html">
      <div class="ci"><i class="ti ti-ship"></i></div>
      <h3>海关数据获客 <span class="ready">可用</span></h3>
      <p>选你的产品 → 系统转 HS 编码 → 从 <b style="color:var(--tx2)">275 万条真实买家</b>里找到进口商(110 万带邮箱)→ 交给 AI 筛选写信。</p>
      <div class="go">打开 <i class="ti ti-arrow-right"></i></div>
    </a>

    <a class="card" href="/quote-lens.html">
      <div class="ci"><i class="ti ti-file-invoice"></i></div>
      <h3>报价自动化 <span class="ready">可用</span></h3>
      <p>填公司+产品+价格+图片,右边<b style="color:var(--tx2)">实时出专业报价单/PI</b>,下载 PDF、导出 Excel;还能导入现成报价单让 AI 识别+改。</p>
      <div class="go">打开 <i class="ti ti-arrow-right"></i></div>
    </a>
  </div>

  <div class="sep"><i class="ti ti-corner-down-right"></i> SEO / GEO 单独一个链接(没并进来):<a href="/seo-lens.html">/seo-lens.html</a></div>

  <div class="foot">本地预览,未接入控制台、未推线上。</div>
</div>
