<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智拓客 · 首页整页预览（临时·暗色）</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#030303; --panel:rgba(255,255,255,.022); --panel2:rgba(255,255,255,.04);
    --card:rgba(255,255,255,.03); --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.14);
    --text:#e5e7eb; --sub:rgba(255,255,255,.45); --sub2:rgba(255,255,255,.30);
    --accent:#6366f1; --accent2:#818cf8; --accent-soft:rgba(99,102,241,.12);
    --green:#4ade80; --amber:#fbbf24;
    --grad:linear-gradient(120deg,#818cf8 8%,#6366f1 42%,#4ade80);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
    overflow:hidden; }
  .shell{ display:flex; height:100vh; }

  /* 侧边栏 */
  .side{ width:224px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:18px 12px; }
  .brand{ display:flex; align-items:center; gap:10px; padding:4px 6px 18px; }
  .brand .lg{ width:34px; height:34px; border-radius:10px;
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.05rem;
    box-shadow:0 6px 18px rgba(99,102,241,.35); }
  .brand b{ font-size:.98rem; }
  .brand .s{ font-size:.6rem; color:var(--sub2); letter-spacing:.05em; margin-top:1px; }
  .ng{ font-size:.6rem; font-weight:800; color:var(--sub2); letter-spacing:.16em; padding:15px 10px 6px; }
  .ni{ display:flex; align-items:center; gap:11px; font-size:.82rem; color:var(--sub);
    padding:9px 11px; border-radius:9px; margin-bottom:2px; cursor:pointer; position:relative; transition:.14s; }
  .ni i{ font-size:1.05rem; width:19px; text-align:center; opacity:.85; }
  .ni:hover{ background:rgba(255,255,255,.045); color:var(--text); }
  .ni.on{ background:linear-gradient(90deg,rgba(99,102,241,.20),rgba(99,102,241,.04));
    color:#c7d2fe; font-weight:700; }
  .ni.on i{ color:var(--accent2); opacity:1; }
  .ni.on::before{ content:''; position:absolute; left:-12px; top:8px; bottom:8px; width:3px;
    border-radius:3px; background:linear-gradient(180deg,var(--accent),var(--green)); box-shadow:0 0 12px rgba(99,102,241,.6); }
  .ni .tag{ margin-left:auto; font-size:.55rem; font-weight:800; padding:1.5px 7px; border-radius:5px; }
  .tag.live{ color:#86efac; background:rgba(74,222,128,.13); }
  .tag.soon{ color:var(--amber); background:rgba(251,191,36,.13); }
  .tag.admin{ color:#a5b4fc; background:rgba(99,102,241,.14); }
  .foot{ margin-top:auto; display:flex; align-items:center; gap:10px; padding:11px;
    background:var(--card); border:1px solid var(--border); border-radius:12px; }
  .foot .av{ width:30px; height:30px; border-radius:9px;
    background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:700; }
  .foot .em{ font-size:.68rem; font-weight:600; }
  .foot .rl{ font-size:.58rem; color:var(--amber); }
  .foot .quit{ margin-left:auto; color:var(--sub2); cursor:pointer; }

  /* 主区 —— 首页大留白 */
  .main{ flex:1; min-width:0; position:relative; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; overflow:hidden; padding:40px; }
  .glow{ position:absolute; border-radius:50%; filter:blur(110px); pointer-events:none; }
  .glow.a{ width:460px; height:460px; background:var(--accent); opacity:.14; top:-90px; left:42%; }
  .glow.b{ width:340px; height:340px; background:var(--green); opacity:0; bottom:-70px; right:16%; transition:opacity .6s; }

  /* 顶部临时工具条 */
  .bar{ position:absolute; top:18px; right:22px; display:flex; align-items:center; gap:8px; z-index:5; }
  .seg{ display:flex; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:3px; }
  .seg button{ font-size:.72rem; font-weight:700; color:var(--sub); border:none; background:transparent;
    padding:7px 13px; border-radius:8px; cursor:pointer; font-family:inherit; }
  .seg button.on{ color:#fff; background:linear-gradient(135deg,var(--accent2),var(--accent));
    box-shadow:0 4px 14px rgba(99,102,241,.4); }
  .rp{ font-size:.72rem; color:var(--sub); background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:8px 13px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-family:inherit; transition:.15s; }
  .rp:hover{ color:var(--text); border-color:var(--border2); }
  .flagtxt{ position:absolute; top:22px; left:24px; font-size:.66rem;
    background:rgba(251,191,36,.09); border:1px solid rgba(251,191,36,.22); color:var(--amber);
    padding:5px 11px; border-radius:20px; }

  .eyebrow{ position:relative; font-size:.7rem; font-weight:700; letter-spacing:.24em; text-transform:uppercase;
    color:var(--sub2); display:flex; align-items:center; gap:10px; }
  .eyebrow::before,.eyebrow::after{ content:''; width:26px; height:1px; background:var(--border2); }
  .l1{ position:relative; font-size:1.15rem; color:var(--sub); margin-top:22px; }
  .l1 b{ color:var(--text); font-weight:700; }

  .numwrap{ position:relative; margin:8px 0 4px; }
  .num{ font-size:7.5rem; line-height:1; font-weight:850; letter-spacing:-.04em; font-variant-numeric:tabular-nums;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 8px 40px rgba(99,102,241,.35)); }
  /* 翻牌 */
  .odo{ display:inline-flex; height:120px; overflow:hidden; filter:drop-shadow(0 8px 40px rgba(99,102,241,.35)); }
  .odo .reel{ display:flex; flex-direction:column; }
  .odo .reel span{ height:120px; line-height:120px; font-size:7.5rem; font-weight:850; letter-spacing:-.04em;
    font-variant-numeric:tabular-nums; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }

  .l2{ position:relative; font-size:1.35rem; font-weight:700; color:var(--text); }
  .l2 .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green);
    margin:0 2px 0 4px; vertical-align:middle; box-shadow:0 0 0 5px rgba(74,222,128,.14); }
  .l2 .hi{ color:#86efac; }
  .divider{ position:relative; width:60px; height:2px; border-radius:2px; margin:26px 0 20px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent); }
  .sub2{ position:relative; font-size:.98rem; color:var(--sub); }
  .sub2 b{ color:#a5b4fc; font-weight:800; font-variant-numeric:tabular-nums; }
  .sub2 .sep{ color:var(--sub2); margin:0 12px; }
  .cta{ position:relative; margin-top:32px; display:inline-flex; align-items:center; gap:10px;
    font-size:.92rem; font-weight:700; color:#fff; padding:14px 30px; border:none; border-radius:13px;
    cursor:pointer; font-family:inherit; background:linear-gradient(135deg,var(--accent2),var(--accent));
    box-shadow:0 12px 34px rgba(99,102,241,.42); transition:transform .15s, box-shadow .15s; }
  .cta:hover{ transform:translateY(-2px); box-shadow:0 16px 40px rgba(99,102,241,.5); }

  .st{ opacity:0; transform:translateY(18px); }
  .st.show{ opacity:1; transform:none; transition:opacity .55s ease, transform .55s cubic-bezier(.2,.7,.3,1); }
  @media (prefers-reduced-motion: reduce){ .st,.num,.cta{ transition:none !important; } }
  @media(max-width:860px){ .side{ display:none; } .num,.odo .reel span{ font-size:5rem; } .odo{ height:80px; } .odo .reel span{ height:80px; line-height:80px; } }
</style>
</head>
<body>
<div class="shell">
  <div class="side">
    <div class="brand">
      <div class="lg"><i class="ti ti-bolt"></i></div>
      <div><b>智拓客</b><div class="s">外贸客户增长中台</div></div>
    </div>
    <div class="ng">总览</div>
    <div class="ni on"><i class="ti ti-home"></i> 个人中心</div>
    <div class="ng">拓客服务</div>
    <div class="ni"><i class="ti ti-mail-forward"></i> 冷邮件自动化 <span class="tag live">已上线</span></div>
    <div class="ni"><i class="ti ti-share"></i> 社媒自动发帖 <span class="tag live">已上线</span></div>
    <div class="ni"><i class="ti ti-file-invoice"></i> 报价自动化 <span class="tag soon">即将</span></div>
    <div class="ni"><i class="ti ti-message-chatbot"></i> AI 客服 <span class="tag soon">即将</span></div>
    <div class="ng">我的资产</div>
    <div class="ni"><i class="ti ti-package"></i> 产品品类</div>
    <div class="ni"><i class="ti ti-history"></i> 历史搜索</div>
    <div class="ni"><i class="ti ti-table"></i> 客户表</div>
    <div class="ng">管理</div>
    <div class="ni"><i class="ti ti-users"></i> 账号管理 <span class="tag admin">仅你</span></div>
    <div class="ni"><i class="ti ti-settings"></i> 设置</div>
    <div class="foot">
      <div class="av">S</div>
      <div style="min-width:0"><div class="em">sherry@...</div><div class="rl">管理员</div></div>
      <i class="ti ti-logout quit"></i>
    </div>
  </div>

  <div class="main">
    <div class="flagtxt">临时预览 · /preview-home.html</div>
    <div class="bar">
      <div class="seg">
        <button id="t1" onclick="pick('count')">顺滑滚动</button>
        <button id="t2" class="on" onclick="pick('odo')">翻牌滚动</button>
      </div>
      <button class="rp" onclick="run()"><i class="ti ti-refresh"></i> 重播</button>
    </div>

    <div class="glow a"></div><div class="glow b" id="glow"></div>
    <div class="eyebrow">你的成绩单 · 7月13日</div>
    <div class="l1 st show">智拓客 已为你<b>精准开发</b></div>
    <div class="numwrap st show" id="numwrap"></div>
    <div class="l2 st show">位<span class="dot"></span><span class="hi">高意向客户</span></div>
    <div class="divider st show"></div>
    <div class="sub2 st show">累计发出 <b id="mail">0</b> 封邮件<span class="sep">·</span>覆盖 <b id="ind">0</b> 个行业</div>
    <button class="cta st show"><i class="ti ti-arrow-right"></i> 开始今天的拓客</button>
  </div>
</div>

<script>
let MODE='odo';
const numwrap=document.getElementById('numwrap');
const mail=document.getElementById('mail'), ind=document.getElementById('ind'), glow=document.getElementById('glow');

function pick(m){
  MODE=m;
  document.getElementById('t1').classList.toggle('on', m==='count');
  document.getElementById('t2').classList.toggle('on', m==='odo');
  run();
}
function ease(t){ return 1-Math.pow(1-t,3); }
function count(el,to,dur){
  const start=performance.now();
  (function step(now){
    const p=Math.min((now-start)/dur,1);
    el.textContent=Math.round(ease(p)*to).toLocaleString();
    if(p<1) requestAnimationFrame(step);
  })(performance.now());
}
function run(){
  mail.textContent='0'; ind.textContent='0'; glow.style.opacity='0';
  if(MODE==='count'){
    numwrap.innerHTML='<div class="num">0</div>';
    count(numwrap.querySelector('.num'),128,1600);
    count(mail,512,1600); count(ind,9,1600);
    setTimeout(()=>{ glow.style.opacity='.5'; setTimeout(()=>glow.style.opacity='.14',600); },400);
  } else {
    const digits=['1','2','8'];
    numwrap.innerHTML='<div class="odo">'+digits.map(()=>{
      let c=''; for(let k=0;k<20;k++) c+='<span>'+(k%10)+'</span>';
      return '<div class="reel">'+c+'</div>';
    }).join('')+'</div>';
    const reels=numwrap.querySelectorAll('.reel');
    reels.forEach((r,i)=>{
      r.style.transform='translateY(0)';
      const target=(10+parseInt(digits[i]))*120;
      requestAnimationFrame(()=>{
        r.style.transition='transform 1.7s cubic-bezier(.2,.75,.2,1) '+(i*150)+'ms';
        r.style.transform='translateY(-'+target+'px)';
      });
    });
    count(mail,512,1900); count(ind,9,1900);
    setTimeout(()=>{ glow.style.opacity='.5'; setTimeout(()=>glow.style.opacity='.14',600); },600);
  }
}
run();
</script>
</body>
</html>
