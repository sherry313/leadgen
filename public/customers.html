<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户管理 - 智拓客</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#030303; --card:rgba(255,255,255,0.03); --card2:rgba(255,255,255,0.05);
    --bd:rgba(255,255,255,0.08); --bd2:rgba(255,255,255,0.12);
    --tx:#e5e7eb; --tx2:rgba(255,255,255,0.6); --tx3:rgba(255,255,255,0.38);
    --ac:#6366f1; --ac2:#818cf8; --ok:#34d399;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; }
  .hd{ padding:26px 30px 16px; }
  .hd h1{ font-size:1.35rem; font-weight:800; }
  .hd p{ font-size:.82rem; color:var(--tx3); margin-top:5px; }
  .wrap{ display:flex; gap:18px; padding:0 30px 40px; align-items:flex-start; }

  /* 左：品类列表 */
  .cats{ width:250px; flex-shrink:0; }
  .cats-h{ font-size:.66rem; font-weight:800; color:var(--tx3); letter-spacing:.12em;
    text-transform:uppercase; padding:6px 8px 10px; }
  .cat{ display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;
    border:1px solid transparent; cursor:pointer; margin-bottom:4px; transition:.15s; }
  .cat:hover{ background:var(--card); }
  .cat.on{ background:rgba(99,102,241,0.12); border-color:rgba(99,102,241,0.3); }
  .cat .ci{ width:34px; height:34px; border-radius:9px; background:var(--card2);
    display:flex; align-items:center; justify-content:center; color:var(--ac2); flex-shrink:0; }
  .cat.on .ci{ background:rgba(99,102,241,0.2); color:#c7d2fe; }
  .cat .cn{ font-size:.86rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cat .cc{ font-size:.68rem; color:var(--tx3); margin-top:2px; }
  .cat .meta{ min-width:0; }

  /* 右：客户表 */
  .panel{ flex:1; min-width:0; background:var(--card); border:1px solid var(--bd); border-radius:16px; overflow:hidden; }
  .panel-h{ display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--bd); }
  .panel-h .t{ font-size:1rem; font-weight:700; }
  .panel-h .n{ font-size:.75rem; color:var(--tx3); }
  .panel-h .exp{ margin-left:auto; font-size:.76rem; color:var(--ac2); text-decoration:none;
    border:1px solid var(--bd2); border-radius:8px; padding:6px 12px; display:inline-flex; gap:6px; align-items:center; }
  .panel-h .exp:hover{ background:var(--card2); color:#fff; }
  table{ width:100%; border-collapse:collapse; }
  thead th{ text-align:left; font-size:.7rem; font-weight:700; color:var(--tx3); letter-spacing:.03em;
    padding:11px 20px; border-bottom:1px solid var(--bd); background:rgba(255,255,255,0.015); }
  tbody td{ padding:12px 20px; font-size:.82rem; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
  tbody tr:hover{ background:rgba(255,255,255,0.02); }
  td.co a{ color:var(--tx); text-decoration:none; font-weight:600; }
  td.co a:hover{ color:var(--ac2); text-decoration:underline; }
  td.em{ color:var(--tx2); } td.em.none{ color:var(--tx3); font-style:italic; }
  td.city{ color:var(--tx2); }
  .chip{ display:inline-flex; align-items:center; gap:5px; font-size:.72rem; color:var(--ok);
    background:rgba(52,211,153,0.1); border-radius:20px; padding:3px 10px; }
  .empty{ padding:60px 20px; text-align:center; color:var(--tx3); font-size:.85rem; }
  .empty i{ font-size:34px; display:block; margin-bottom:12px; opacity:.5; }
  .spin{ display:inline-block; width:16px; height:16px; border:2px solid var(--bd2);
    border-top-color:var(--ac2); border-radius:50%; animation:sp .7s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }

  /* 分页条 */
  .pager{ display:flex; align-items:center; gap:12px; padding:14px 20px; border-top:1px solid var(--bd);
    background:rgba(255,255,255,0.012); }
  .pager .range{ font-size:.75rem; color:var(--tx3); }
  .pager .ctrl{ margin-left:auto; display:flex; align-items:center; gap:8px; }
  .pager .pb{ font-size:.78rem; color:var(--tx2); background:var(--card2); border:1px solid var(--bd2);
    border-radius:8px; padding:6px 12px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:.13s; }
  .pager .pb:hover:not(:disabled){ background:rgba(99,102,241,0.16); color:#fff; border-color:rgba(99,102,241,0.4); }
  .pager .pb:disabled{ opacity:.35; cursor:not-allowed; }
  .pager .pinfo{ font-size:.78rem; color:var(--tx2); font-variant-numeric:tabular-nums; min-width:64px; text-align:center; }
  @media(max-width:820px){ .wrap{ flex-direction:column; } .cats{ width:100%; } }
</style>
</head>
<body>
  <div class="hd">
    <h1>客户管理</h1>
    <p>按产品品类查看你的客户表 · 每个品类是一张独立的客户表</p>
  </div>
  <div class="wrap">
    <div class="cats">
      <div class="cats-h">产品品类</div>
      <div id="catList"><div class="cat"><span class="spin"></span></div></div>
    </div>
    <div class="panel">
      <div class="panel-h">
        <div><div class="t" id="pTitle">选择一个品类</div><div class="n" id="pCount"></div></div>
        <a class="exp" id="pExport" style="display:none" target="_blank"><i class="ti ti-download"></i> 导出 Excel</a>
      </div>
      <div id="pBody"><div class="empty"><i class="ti ti-arrow-left"></i>左边选一个产品品类,查看它的客户表</div></div>
    </div>
  </div>

<script>
  function getStoredToken(){
    const s = localStorage.getItem('leadgen_supabase_session');
    if (s){ try{ const o = JSON.parse(s); if(o && o.access_token) return o.access_token; }catch(e){} }
    const t = localStorage.getItem('leadgen_accessToken');
    return (t && t.trim()) ? t.trim() : '';
  }
  const token = getStoredToken();
  if (!token){ location.replace('/login.html?redirect=' + encodeURIComponent('/customers.html')); }
  function authHeaders(){ return { Authorization: 'Bearer ' + token }; }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function fmtWhen(v){ if(!v) return '已发送'; try{ const d=new Date(v); return (d.getMonth()+1)+'月'+d.getDate()+'日'; }catch(e){ return '已发送'; } }

  let _cache = {};
  async function loadCats(){
    const box = document.getElementById('catList');
    try{
      const r = await fetch('/api/products', { headers: authHeaders() });
      const d = await r.json();
      const list = d.profiles || [];
      if (!list.length){ box.innerHTML = '<div class="empty" style="padding:30px 8px"><i class="ti ti-package"></i>还没有产品品类<br><span style="font-size:.75rem">去「邮件获客」新建一个产品后,这里就会出现它的客户表</span></div>'; return; }
      box.innerHTML = list.map((p,i)=>
        '<div class="cat'+(i===0?' on':'')+'" data-id="'+esc(p.id)+'" data-name="'+esc(p.name)+'">'
        + '<div class="ci"><i class="ti ti-package"></i></div>'
        + '<div class="meta"><div class="cn">'+(esc(p.name)||'未命名产品')+'</div>'
        + '<div class="cc">'+(p.leadCount!=null?('客户 '+p.leadCount):(p.searchCount!=null?('搜索 '+p.searchCount+' 次'):'点开查看'))+'</div></div>'
        + '</div>').join('');
      box.querySelectorAll('.cat').forEach(el=> el.addEventListener('click', ()=>{
        box.querySelectorAll('.cat').forEach(x=>x.classList.remove('on')); el.classList.add('on');
        openCat(el.dataset.id, el.dataset.name);
      }));
      openCat(list[0].id, list[0].name);
    }catch(e){ box.innerHTML = '<div class="empty">加载失败：'+esc(e.message)+'</div>'; }
  }

  async function openCat(id, name){
    document.getElementById('pTitle').textContent = name || '客户表';
    document.getElementById('pCount').textContent = '';
    const exp = document.getElementById('pExport');
    exp.style.display='inline-flex'; exp.href='/api/products/'+encodeURIComponent(id)+'/export.xlsx';
    const body = document.getElementById('pBody');
    body.innerHTML = '<div class="empty"><span class="spin"></span></div>';
    let data = _cache[id];
    if (!data){
      try{
        const r = await fetch('/api/products/'+encodeURIComponent(id)+'/leads', { headers: authHeaders() });
        const d = await r.json();
        if (!d.success) throw new Error(d.error||'加载失败');
        data = { name:d.name, leads:d.leads||[] }; _cache[id]=data;
      }catch(e){ body.innerHTML = '<div class="empty">客户表加载失败：'+esc(e.message)+'</div>'; return; }
    }
    const leads = data.leads;
    document.getElementById('pCount').textContent = leads.length + ' 位客户';
    if (!leads.length){ body.innerHTML = '<div class="empty"><i class="ti ti-users"></i>这个品类还没有客户<br><span style="font-size:.75rem">在「邮件获客」用这个产品跑一次搜索,客户就会进这张表</span></div>'; return; }
    // 每次打开品类都从第 1 页开始
    _view = { leads: leads, page: 1 };
    renderLeadsPage();
  }

  // 客户表分页：一页 15 条，底部翻页。避免一长条拉到底。
  const PAGE_SIZE = 15;
  let _view = { leads: [], page: 1 };

  function leadRow(l){
    return '<tr><td class="co">'+(l.website?('<a href="'+esc(l.website)+'" target="_blank" rel="noopener">'+(esc(l.company_name)||'—')+'</a>'):(esc(l.company_name)||'—'))+'</td>'
      + '<td class="em'+(l.email?'':' none')+'">'+(esc(l.email)||'（无邮箱）')+'</td>'
      + '<td class="city">'+(esc((l.city||'').split(',')[0])||'—')+'</td>'
      + '<td><span class="chip"><i class="ti ti-check"></i> '+fmtWhen(l.email_sent_at)+'</span></td></tr>';
  }

  function renderLeadsPage(){
    const body = document.getElementById('pBody');
    const leads = _view.leads;
    const total = leads.length;
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (_view.page > pages) _view.page = pages;
    if (_view.page < 1) _view.page = 1;
    const start = (_view.page - 1) * PAGE_SIZE;
    const slice = leads.slice(start, start + PAGE_SIZE);

    let html = '<table><thead><tr><th>公司名称</th><th>邮箱</th><th>城市</th><th>状态</th></tr></thead><tbody>'
      + slice.map(leadRow).join('') + '</tbody></table>';

    // 只有超过一页才显示翻页条
    if (pages > 1){
      const from = start + 1, to = start + slice.length;
      html += '<div class="pager">'
        + '<span class="range">第 '+from+'–'+to+' 位 · 共 '+total+' 位</span>'
        + '<span class="ctrl">'
        + '<button class="pb" id="pgPrev"'+(_view.page<=1?' disabled':'')+'><i class="ti ti-chevron-left"></i>上一页</button>'
        + '<span class="pinfo">'+_view.page+' / '+pages+'</span>'
        + '<button class="pb" id="pgNext"'+(_view.page>=pages?' disabled':'')+'>下一页<i class="ti ti-chevron-right"></i></button>'
        + '</span></div>';
    }
    body.innerHTML = html;

    const prev = document.getElementById('pgPrev');
    const next = document.getElementById('pgNext');
    if (prev) prev.addEventListener('click', ()=>{ if(_view.page>1){ _view.page--; renderLeadsPage(); body.scrollIntoView({block:'start'}); } });
    if (next) next.addEventListener('click', ()=>{ _view.page++; renderLeadsPage(); body.scrollIntoView({block:'start'}); });
  }

  if (token) loadCats();
</script>
</body>
</html>
