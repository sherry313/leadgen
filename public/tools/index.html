<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>免费外贸工具箱</title>
  <meta name="description" content="免费外贸工具箱：DNS 邮件验证生成器、垃圾词检测器、AI 报价工具。帮你解决外贸获客的每一个问题。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🧰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #030303;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(3,3,3,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-size: 15px; font-weight: 600; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-back { font-size: 13px; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: #fff; }
    .container { max-width: 760px; margin: 0 auto; padding: 0 24px; }
    .page-header {
      text-align: center;
      padding: 80px 0 60px;
    }
    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p { font-size: 15px; color: rgba(255,255,255,0.4); }
    .tools-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }
    .tool-card {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      --mx: 50%; --my: 50%;
    }
    .tool-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(300px circle at var(--mx) var(--my), rgba(99,102,241,0.1), transparent 60%);
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .tool-card:hover { border-color: rgba(99,102,241,0.35); background: rgba(99,102,241,0.04); }
    .tool-card:hover::before { opacity: 1; }
    .tool-card > * { position: relative; z-index: 1; }
    .tool-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .tool-info { flex: 1; }
    .tool-info h3 { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
    .tool-info p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.5; }
    .tool-arrow { color: rgba(255,255,255,0.25); font-size: 18px; transition: transform 0.2s, color 0.2s; }
    .tool-card:hover .tool-arrow { transform: translateX(4px); color: rgba(99,102,241,0.8); }
    footer { text-align: center; padding: 32px 0; border-top: 1px solid rgba(255,255,255,0.06); }
    footer a { font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none; }
    footer a:hover { color: rgba(255,255,255,0.6); }
    .fade-up { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    .fade-up:nth-child(2) { transition-delay: 0.1s; }
    .fade-up:nth-child(3) { transition-delay: 0.2s; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">⚡ 智拓客</a>
  <a href="/" class="nav-back">← 返回首页</a>
</nav>

<div class="container">

  <div class="page-header">
    <h1>免费外贸工具箱</h1>
    <p>帮你解决外贸获客的每一个问题</p>
  </div>

  <div class="tools-grid">

    <a class="tool-card fade-up" href="/tools/dns-generator.html">
      <div class="tool-icon">🛡</div>
      <div class="tool-info">
        <h3>DNS 邮件验证记录生成器</h3>
        <p>一键生成 SPF、DKIM、DMARC 记录，让邮件不再进垃圾箱</p>
      </div>
      <div class="tool-arrow">→</div>
    </a>

    <a class="tool-card fade-up" href="/tools/spam-word-checker.html">
      <div class="tool-icon">🔍</div>
      <div class="tool-info">
        <h3>邮件垃圾词检测器</h3>
        <p>检查你的邮件有没有触发垃圾箱的词，并给出替换建议</p>
      </div>
      <div class="tool-arrow">→</div>
    </a>


  </div>

  <footer>
    <a href="/">← 返回首页</a>
  </footer>
</div>

<script>
  document.querySelectorAll('.tool-card').forEach(card => {
    card.addEventListener('pointermove', e => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
      card.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
  });
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
</script>

</body>
</html>
