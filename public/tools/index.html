<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>免费外贸工具箱</title>
  <meta name="description" content="免费外贸工具箱：DNS 邮件验证生成器、垃圾词检测器、AI 报价工具。帮你解决外贸获客的每一个问题。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🧰</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0a0f1a;
      --card:      #0d1520;
      --card-on:   #0a1628;
      --border:    #1e2d4a;
      --border-on: #4299e1;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --text-mute: #4a5568;
      --blue:      #4299e1;
    }
    html, body { background: var(--bg); }
    body {
      font-family: -apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
      color: var(--text); min-height: 100vh; line-height: 1.5;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px 80px; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 44px; }
    .header h1 {
      font-size: 2.1rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #4299e1, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      margin-top: 12px; font-size: 0.95rem; color: var(--text-dim);
      max-width: 560px; margin-left: auto; margin-right: auto;
    }

    /* ── Tool cards ── */
    .tools-grid { display: flex; flex-direction: column; gap: 14px; }

    .tool-card {
      display: flex; align-items: center; gap: 18px;
      padding: 20px 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none; color: inherit;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .tool-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-on);
      background: var(--card-on);
      box-shadow: 0 0 0 1px #4299e122, 0 10px 32px rgba(66,153,225,0.18);
    }

    .tool-icon {
      font-size: 2.2rem; line-height: 1; flex-shrink: 0;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(66,153,225,0.08);
      border: 1px solid rgba(66,153,225,0.18);
      border-radius: 12px;
      transition: background 0.18s, border-color 0.18s;
    }
    .tool-card:hover .tool-icon {
      background: rgba(66,153,225,0.16);
      border-color: rgba(66,153,225,0.35);
    }

    .tool-body { flex: 1; min-width: 0; }
    .tool-title {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      letter-spacing: -0.2px; margin-bottom: 4px;
    }
    .tool-card:hover .tool-title { color: #93c5fd; }
    .tool-desc {
      font-size: 0.85rem; color: var(--text-dim); line-height: 1.55;
    }

    .tool-arrow {
      flex-shrink: 0;
      color: var(--text-mute);
      font-size: 1.3rem; line-height: 1;
      transition: color 0.18s, transform 0.18s;
    }
    .tool-card:hover .tool-arrow {
      color: var(--blue);
      transform: translateX(4px);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 48px; padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center; font-size: 0.85rem;
    }
    .footer a {
      color: #93c5fd; text-decoration: none; font-weight: 500;
    }
    .footer a:hover { color: #60a5fa; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .container { padding: 40px 16px 60px; }
      .header h1 { font-size: 1.65rem; }
      .header p  { font-size: 0.86rem; }
      .tool-card { padding: 16px 16px; gap: 14px; }
      .tool-icon { width: 48px; height: 48px; font-size: 1.85rem; }
      .tool-title { font-size: 0.98rem; }
      .tool-desc  { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>免费外贸工具箱</h1>
      <p>帮你解决外贸获客的每一个问题</p>
    </div>

    <div class="tools-grid">

      <a class="tool-card" href="/tools/dns-generator.html">
        <div class="tool-icon">🛡</div>
        <div class="tool-body">
          <div class="tool-title">DNS 邮件验证记录生成器</div>
          <div class="tool-desc">一键生成 SPF、DKIM、DMARC 记录，让邮件不再进垃圾箱</div>
        </div>
        <div class="tool-arrow">→</div>
      </a>

      <a class="tool-card" href="/tools/spam-word-checker.html">
        <div class="tool-icon">🔍</div>
        <div class="tool-body">
          <div class="tool-title">邮件垃圾词检测器</div>
          <div class="tool-desc">检查你的邮件有没有触发垃圾箱的词，并给出替换建议</div>
        </div>
        <div class="tool-arrow">→</div>
      </a>

      <a class="tool-card" href="/quote.html">
        <div class="tool-icon">💰</div>
        <div class="tool-body">
          <div class="tool-title">AI 报价工具</div>
          <div class="tool-desc">30 秒生成专业报价单，直接发到客户邮箱</div>
        </div>
        <div class="tool-arrow">→</div>
      </a>

    </div>

    <div class="footer">
      <a href="/">← 返回首页</a>
    </div>
  </div>

</body>
</html>
