<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮件垃圾词检测器 — 免费工具</title>
  <meta name="description" content="一键检查你的邮件内容有没有触发垃圾箱的词。免费工具，无需注册，不上传数据。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🔍</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0a0f1a;
      --card:      #0d1520;
      --card-on:   #0a1628;
      --border:    #1e2d4a;
      --border-on: #4299e1;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --text-mute: #4a5568;
      --blue:      #4299e1;
      --purple:    #7f5af0;
      --green:     #1D9E75;
      --amber:     #BA7517;
      --red:       #dc2626;
    }
    html, body { background: var(--bg); }
    body {
      font-family: -apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
      color: var(--text); min-height: 100vh; line-height: 1.5;
    }

    .container { max-width: 760px; margin: 0 auto; padding: 48px 20px 80px; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 36px; }
    .header h1 {
      font-size: 1.85rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #4299e1, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      margin-top: 10px; font-size: 0.92rem; color: var(--text-dim);
      max-width: 540px; margin-left: auto; margin-right: auto;
    }

    /* ── Section ── */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 0.78rem; font-weight: 700; color: #93c5fd;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* ── Textarea ── */
    .textarea {
      width: 100%; padding: .85rem 1rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 0.95rem; line-height: 1.55;
      outline: none; resize: vertical; min-height: 160px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }

    /* ── Run button ── */
    .run-btn {
      width: 100%; padding: 14px;
      border-radius: 11px; border: none;
      background: linear-gradient(135deg, #378ADD, #534AB7);
      color: #fff; font-size: 1rem; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(55,138,221,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .run-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(55,138,221,0.45); }

    /* ── Result section ── */
    .results { margin-top: 36px; display: none; }
    .results.show { display: block; }

    /* ── Score card (color-coded by severity) ── */
    .score-card {
      padding: 22px 24px;
      border-radius: 12px;
      border: 1px solid;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 18px;
    }
    .score-card .icon {
      font-size: 2rem; flex-shrink: 0;
    }
    .score-card .label {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px;
    }
    .score-card .meta {
      margin-top: 4px; font-size: 0.85rem; opacity: 0.85;
    }
    .score-safe   { background: rgba(29,158,117,0.08);  border-color: rgba(29,158,117,0.45);  color: #6ee7b7; }
    .score-warn   { background: rgba(186,117,23,0.08);  border-color: rgba(186,117,23,0.45);  color: #fbbf24; }
    .score-danger { background: rgba(220,38,38,0.10);   border-color: rgba(220,38,38,0.5);    color: #fca5a5; }

    /* ── Highlighted text preview ── */
    .preview-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px; margin-bottom: 18px;
    }
    .preview-title { font-size: 0.85rem; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; }
    .preview-text {
      font-size: 0.92rem; line-height: 1.65;
      white-space: pre-wrap; word-wrap: break-word;
      max-height: 400px; overflow-y: auto;
      padding-right: 4px;
      color: var(--text);
    }
    .spam-mark {
      background: rgba(220,38,38,0.28);
      color: #fecaca;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
      border-bottom: 1.5px solid rgba(220,38,38,0.6);
    }

    /* ── Word list ── */
    .word-list-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
    }
    .word-list-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; color: var(--text); }
    .word-row {
      display: grid; grid-template-columns: minmax(140px, 1fr) auto 2fr;
      gap: 14px; align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(148,163,184,0.12);
    }
    .word-row:last-child { border-bottom: none; }
    .word-row .word {
      font-weight: 700; color: #fca5a5;
      font-family: ui-monospace,Menlo,Monaco,Consolas,monospace;
      font-size: 0.88rem; word-break: break-word;
    }
    .word-row .count {
      font-size: 0.74rem; color: var(--text-mute);
      background: rgba(148,163,184,0.08);
      padding: 2px 8px; border-radius: 999px;
      white-space: nowrap;
    }
    .word-row .suggestion {
      font-size: 0.85rem; color: var(--text-dim);
      line-height: 1.5;
    }
    .word-row .suggestion strong { color: #6ee7b7; font-weight: 600; }
    .word-row .suggestion em { font-style: normal; color: var(--text-mute); }

    /* ── Footer ── */
    .footer {
      margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center; font-size: 0.78rem; color: var(--text-mute);
    }
    .footer p { line-height: 1.6; }
    .footer a {
      display: inline-block; margin-top: 10px;
      color: #93c5fd; text-decoration: none; font-weight: 500;
    }
    .footer a:hover { color: #60a5fa; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .container { padding: 32px 16px 60px; }
      .header h1 { font-size: 1.5rem; }
      .header p  { font-size: 0.85rem; }
      .word-row { grid-template-columns: 1fr; gap: 4px; }
      .word-row .count { justify-self: start; }
      .score-card { padding: 18px 18px; gap: 14px; }
      .score-card .icon { font-size: 1.7rem; }
      .score-card .label { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>邮件垃圾词检测器</h1>
      <p>检查你的邮件内容有没有触发垃圾箱的词</p>
    </div>

    <!-- 1. Input -->
    <div class="section">
      <div class="section-title">1. 粘贴你的邮件内容</div>
      <textarea id="emailContent" class="textarea" rows="6"
        placeholder="粘贴你的邮件主题行和正文..."></textarea>
    </div>

    <!-- 2. Run button -->
    <button class="run-btn" onclick="runCheck()">🔍 开始检测</button>

    <!-- 3. Results -->
    <div class="results" id="results">
      <div id="scoreSlot"></div>
      <div class="preview-card">
        <div class="preview-title">原文（红色标记为检测到的垃圾词）</div>
        <div class="preview-text" id="previewText"></div>
      </div>
      <div class="word-list-card" id="wordListCard">
        <div class="word-list-title">检测到的词 · 替换建议</div>
        <div id="wordList"></div>
      </div>
    </div>

    <div class="footer">
      <p>免责声明：本工具仅提供参考，实际送达率受多种因素影响。</p>
      <a href="/">← 返回智拓客</a>
    </div>
  </div>

  <script>
    // ── Spam word list (60 entries: 45 English + 15 Chinese) ─────────────
    const SPAM_WORDS = [
      // English
      'free', 'no obligation', 'no contract', 'no commitment', 'no risk',
      'no cost', 'no catch', 'guarantee', 'guaranteed', 'act now',
      'limited time', 'urgent', 'click here', 'buy now', 'order now',
      'sign up free', '100% free', 'risk free', 'no strings attached',
      'winner', 'congratulations', "you've been selected", 'earn money',
      'make money', 'extra income', 'work from home', 'as seen on',
      'special promotion', 'exclusive deal', 'best price', 'lowest price',
      'one time offer', "don't miss", "don't delete", "this isn't spam",
      'not spam', 'unsubscribe', 'opt out', 'click below',
      'open immediately', 'please read', 'important information',
      'dear friend', 'dear sir',
      // Chinese
      '免费', '无风险', '不要钱', '立即购买', '限时优惠',
      '恭喜你', '中奖', '赚钱', '月入过万', '独家优惠',
      '最低价', '不容错过', '立刻行动', '零成本', '零风险',
    ];

    // ── Replacement suggestions ──────────────────────────────────────────
    const REPLACEMENTS = {
      'no obligation': "you decide if it's worth your time",
      'no contract':   'simple and straightforward',
      'no commitment': 'see if it makes sense for you',
      'free':          'complimentary',
      'guarantee':     'we stand behind our work',
      'act now':       "when you're ready",
      'limited time':  'currently available',
      'no risk':       'low-pressure',
      'click here':    'learn more at',
      '免费':          '赠送',
      '无风险':         '放心试用',
      '限时优惠':       '目前可用',
    };

    const $ = id => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function escapeRegex(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ── Detect — single-pass regex with longest-phrase-first alternation ─
    function detect(text) {
      if (!text.trim()) return { matches: [], totalOccurrences: 0 };
      const sorted = SPAM_WORDS.slice().sort((a, b) => b.length - a.length);
      const pattern = sorted.map(escapeRegex).join('|');
      const re = new RegExp(pattern, 'gi');
      const lcMap = new Map(SPAM_WORDS.map(w => [w.toLowerCase(), w]));
      const counts = new Map();
      let totalOcc = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        const canonical = lcMap.get(m[0].toLowerCase());
        if (canonical) {
          counts.set(canonical, (counts.get(canonical) || 0) + 1);
          totalOcc++;
        }
      }
      const matches = Array.from(counts.entries())
        .map(([word, count]) => ({ word, count }))
        .sort((a, b) => b.count - a.count || a.word.localeCompare(b.word));
      return { matches, totalOccurrences: totalOcc };
    }

    // ── Render highlighted text (HTML-escaped first, then marked) ────────
    function buildHighlighted(text) {
      if (!text) return '';
      const sorted = SPAM_WORDS.slice().sort((a, b) => b.length - a.length);
      const pattern = sorted.map(escapeRegex).join('|');
      const re = new RegExp(pattern, 'gi');

      // Walk text by regex.exec, escaping the slices between matches and wrapping matches.
      let out = '';
      let lastIndex = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        out += escapeHtml(text.slice(lastIndex, m.index));
        out += '<mark class="spam-mark">' + escapeHtml(m[0]) + '</mark>';
        lastIndex = m.index + m[0].length;
      }
      out += escapeHtml(text.slice(lastIndex));
      return out;
    }

    // ── Render score card ────────────────────────────────────────────────
    function buildScoreCard(uniqueCount, totalOcc) {
      let cls, icon, label;
      if (uniqueCount === 0) {
        cls   = 'score-safe';
        icon  = '🛡️';
        label = '安全 — 未检测到常见垃圾词';
      } else if (uniqueCount <= 2) {
        cls   = 'score-warn';
        icon  = '⚠️';
        label = `注意 — 检测到 ${uniqueCount} 个垃圾词`;
      } else {
        cls   = 'score-danger';
        icon  = '🚨';
        label = `危险 — 检测到 ${uniqueCount} 个垃圾词`;
      }
      const metaText = uniqueCount > 0
        ? `总计出现 ${totalOcc} 次 · 建议调整后再发送`
        : '邮件内容通过基础垃圾词筛查，但实际送达率仍受发件信誉、SPF/DKIM/DMARC 等影响';
      return `<div class="score-card ${cls}">
        <div class="icon">${icon}</div>
        <div>
          <div class="label">${label}</div>
          <div class="meta">${metaText}</div>
        </div>
      </div>`;
    }

    // ── Render word list ────────────────────────────────────────────────
    function buildWordList(matches) {
      if (!matches.length) {
        return '<div style="color:var(--text-mute);font-size:0.88rem">没有需要替换的词。</div>';
      }
      return matches.map(({ word, count }) => {
        const suggestion = REPLACEMENTS[word.toLowerCase()];
        const sugHtml = suggestion
          ? `建议替换为 <strong>"${escapeHtml(suggestion)}"</strong>`
          : `<em>考虑重新措辞或换一种说法</em>`;
        return `<div class="word-row">
          <span class="word">${escapeHtml(word)}</span>
          <span class="count">× ${count}</span>
          <span class="suggestion">${sugHtml}</span>
        </div>`;
      }).join('');
    }

    // ── Run check ────────────────────────────────────────────────────────
    function runCheck() {
      const text = $('emailContent').value;
      const { matches, totalOccurrences } = detect(text);

      $('scoreSlot').innerHTML  = buildScoreCard(matches.length, totalOccurrences);
      $('previewText').innerHTML = buildHighlighted(text) || '<span style="color:var(--text-mute)">（未输入内容）</span>';
      $('wordList').innerHTML   = buildWordList(matches);

      const results = $('results');
      results.classList.add('show');
      setTimeout(() => results.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
  </script>

</body>
</html>
