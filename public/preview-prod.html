<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品品类 · 重设计预览</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  :root{
    --bg:#030303; --card:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08);
    --text:#e5e7eb; --sub:rgba(255,255,255,0.45); --sub2:rgba(255,255,255,0.30);
    --accent:#6366f1; --accent-soft:rgba(99,102,241,0.12); --danger:#f87171; --sent:#4ade80; --cost:#fbbf24;
  }
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; padding:40px 6%; }
  .wrap{ max-width:900px; margin:0 auto; }
  .note{ font-size:0.72rem; color:var(--cost); background:rgba(251,191,36,0.09); border:1px solid rgba(251,191,36,0.22); border-radius:20px; padding:5px 12px; display:inline-block; margin-bottom:22px; }

  .sec-label{ font-size:0.78rem; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:0.06em; margin:0 0 10px 2px; display:flex; align-items:center; gap:7px; }
  .sec-label i{ color:var(--accent); font-size:0.95rem; }
  .sec-label .tip{ font-size:0.7rem; color:var(--sub2); font-weight:400; text-transform:none; letter-spacing:0; }
  .btn-new{ margin-left:auto; display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:var(--accent); color:#fff; border-radius:8px; font-size:0.8rem; font-weight:600; border:none; cursor:pointer; font-family:inherit; transition:background 0.15s; }
  .btn-new:hover{ background:#4f52d4; }

  .prod-head{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  .prod-head .sec-label{ margin-bottom:0; }

  .prod-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; align-items:stretch; }
  .p-card{ position:relative; width:236px; background:var(--card); border:1px solid var(--border); border-radius:13px; padding:13px 14px 12px 17px; transition:transform 0.15s,border-color 0.15s; }
  .p-card::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:13px 0 0 13px; background:linear-gradient(180deg,#6366f1,#4ade80); opacity:0.35; }
  .p-card.active{ border-color:rgba(99,102,241,0.45); background:radial-gradient(200px 110px at 100% 0%,rgba(99,102,241,0.14),transparent 70%),var(--card); }
  .p-card.active::before{ opacity:1; box-shadow:0 0 12px rgba(99,102,241,0.5); }
  .p-card:hover{ transform:translateY(-1px); border-color:rgba(99,102,241,0.4); }
  .p-card .head{ display:flex; align-items:center; gap:7px; margin-bottom:4px; }
  .p-card .name{ font-size:0.88rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .p-card .live-dot{ width:7px; height:7px; border-radius:50%; background:#4ade80; box-shadow:0 0 8px rgba(74,222,128,0.8); flex-shrink:0; }
  .p-card .live-txt{ font-size:0.64rem; color:#86efac; white-space:nowrap; }
  .p-card .pstats{ font-size:0.7rem; color:var(--sub2); margin-bottom:10px; font-variant-numeric:tabular-nums; }
  .p-card .pstats b{ color:var(--sub); font-weight:600; }
  .p-card .acts{ display:flex; gap:5px; align-items:center; position:relative; }
  .p-card .acts .mini{ margin-left:auto; }
  .p-card .btn-s{ font-size:0.72rem; border-radius:6px; padding:4px 10px; border:1px solid; display:inline-flex; align-items:center; gap:4px; cursor:pointer; font-family:inherit; background:transparent; transition:all 0.15s; }
  .p-card .use{ color:#a5b4fc; background:var(--accent-soft); border-color:rgba(99,102,241,0.4); }
  .p-card .use:hover{ background:rgba(99,102,241,0.22); }
  .p-card .tbl{ color:#86efac; background:rgba(74,222,128,0.10); border-color:rgba(74,222,128,0.35); }
  .p-card .tbl:hover{ background:rgba(74,222,128,0.18); }
  .p-card .mini{ color:var(--sub2); font-size:0.8rem; cursor:pointer; background:transparent; border:none; font-family:inherit; padding:3px 4px; }
  .p-card .mini:hover{ color:var(--text); }
  .prod-empty{ font-size:0.78rem; color:var(--sub); padding:4px 2px 6px; }
  .prod-empty a{ color:#a5b4fc; }

  .menu-pop{ position:absolute; right:0; top:32px; z-index:60; background:#0c0c12; border:1px solid var(--border); border-radius:9px; padding:5px; width:130px; box-shadow:0 8px 30px rgba(0,0,0,0.6); }
  .menu-pop .mi{ display:flex; align-items:center; gap:7px; font-size:0.76rem; color:var(--sub); padding:7px 9px; border-radius:6px; cursor:pointer; }
  .menu-pop .mi:hover{ background:rgba(255,255,255,0.05); color:var(--text); }
  .menu-pop .mi.danger{ color:var(--danger); }
  .menu-pop .mi.danger:hover{ background:rgba(248,113,113,0.08); }

  .cap{ font-size:0.72rem; color:var(--sub2); margin-top:26px; line-height:1.7; }
  .cap b{ color:var(--sub); font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="note">重设计预览 · 仅产品品类这一块（真实暗色 · 可点 ⋯ 菜单）</div>

  <div class="prod-head">
    <div class="sec-label"><i class="ti ti-package"></i> 产品品类 <span class="tip">名称随你改，历史记录同步显示</span></div>
    <button class="btn-new"><i class="ti ti-plus"></i> 保存当前产品</button>
  </div>

  <div class="prod-row" id="row"></div>

  <div class="cap">
    · <b>保存当前产品</b>：右上角固定实心按钮，位置不再随卡片数量乱跳<br>
    · 每张卡只剩 <b>[使用] [客户表] + ⋯</b>，重命名 / 删除收进 ⋯ 菜单（点右侧第二张卡的 ⋯ 试试）<br>
    · 正在使用的卡（第二张）标题带绿点「使用中」，不再重复显示「使用」按钮
  </div>
</div>

<script>
  const products=[
    { id:'a', name:'自动装盒机，一键调节…', customers:0, active:false },
    { id:'b', name:'系统门窗、全屋定制家居、卫…', customers:142, active:true },
    { id:'c', name:'铝合金型材 · 幕墙工程', customers:37, active:false },
  ];
  function render(){
    document.getElementById('row').innerHTML=products.map(p=>{
      const n=p.customers||0;
      return '<div class="p-card'+(p.active?' active':'')+'">'+
        '<div class="head"><span class="name" title="'+p.name+'">'+p.name+'</span>'+
          (p.active?'<span class="live-dot"></span><span class="live-txt">使用中</span>':'')+
        '</div>'+
        '<div class="pstats">客户 <b>'+n+'</b>'+(n?' · 已全部发信':' · 还没发过邮件')+'</div>'+
        '<div class="acts">'+
          (p.active?'':'<button class="btn-s use"><i class="ti ti-arrow-right"></i> 使用</button>')+
          '<button class="btn-s tbl"><i class="ti ti-table"></i> 客户表</button>'+
          '<button class="mini" title="更多" onclick="menu(event)"><i class="ti ti-dots"></i></button>'+
        '</div>'+
      '</div>';
    }).join('');
  }
  function closeMenus(){ document.querySelectorAll('.menu-pop').forEach(m=>m.remove()); }
  function menu(ev){
    ev.stopPropagation();
    const acts=ev.currentTarget.closest('.acts');
    const existing=acts.querySelector('.menu-pop');
    closeMenus(); if(existing) return;
    const m=document.createElement('div'); m.className='menu-pop';
    m.innerHTML='<div class="mi"><i class="ti ti-pencil"></i> 重命名</div><div class="mi danger"><i class="ti ti-trash"></i> 删除产品</div>';
    acts.appendChild(m);
  }
  document.addEventListener('click',closeMenus);
  render();
</script>
</body>
</html>
