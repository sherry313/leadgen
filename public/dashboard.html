<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - 智拓客</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --card: rgba(30,41,59,0.85);
      --border: rgba(148,163,184,0.12);
      --text: #f1f5f9;
      --text-white: #f1f5f9;
      --sub: #94a3b8;
      --text-muted: #94a3b8;
      --blue: #2563eb;
      --blue-light: #3b82f6;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
      height: 64px;
      background: rgba(15,23,42,0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06);
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #2563eb, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      user-select: none;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--sub);
      font-size: 0.88rem;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); font-weight: 700; }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 1.2rem;
      background: var(--blue);
      color: #fff !important;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-nav:hover { background: #1d4ed8; transform: translateY(-1px); }

    /* Mobile hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: 0.3s;
    }

    .nav-primary { color: var(--text-white) !important; font-weight: 700; }
    .nav-email-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 0.35rem 0.85rem; background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.3); border-radius: 20px; color: #93c5fd !important;
      font-size: 0.8rem; font-weight: 600; transition: all 0.18s; white-space: nowrap;
    }
    .nav-email-btn:hover { background: rgba(37,99,235,0.22); border-color: rgba(99,179,237,0.5); color: #f1f5f9 !important; }
    .nav-user-btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: var(--text-white); font-size: 0.84rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .nav-user-btn:hover { background: rgba(255,255,255,0.13); }
    .nav-dropdown { position: relative; }
    .nav-dropdown-menu {
      display: none; position: absolute; right: 0; top: calc(100% + 10px);
      background: rgba(13,20,38,0.98); border: 1px solid rgba(148,163,184,0.15);
      border-radius: 10px; padding: 5px; min-width: 155px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.55); z-index: 500;
      backdrop-filter: blur(14px);
    }
    .nav-dropdown-menu.open { display: block; }
    .nav-dd-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 7px;
      color: var(--text-muted); font-size: 0.83rem; cursor: pointer; text-decoration: none;
      transition: all 0.12s; white-space: nowrap; background: none; border: none;
      width: 100%; font-family: inherit; text-align: left;
    }
    .nav-dd-item:hover { background: rgba(255,255,255,0.07); color: var(--text-white); }
    .nav-dd-item.danger { color: #f87171; }
    .nav-dd-item.danger:hover { background: rgba(239,68,68,0.1); color: #f87171; }
    .nav-dd-sep { height: 1px; background: rgba(148,163,184,0.12); margin: 4px 0; }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 64px; left: 0; right: 0;
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 99;
      padding: 1rem 6%;
      border-bottom: 1px solid var(--border);
    }

    .mobile-menu.open { display: block; }

    .mobile-menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .mobile-menu a {
      text-decoration: none;
      color: var(--sub);
      font-size: 0.95rem;
      padding: 0.4rem 0;
      display: block;
      transition: color 0.2s;
    }

    .mobile-menu a:hover,
    .mobile-menu a.active { color: var(--text); font-weight: 700; }

    /* ── MAIN ── */
    .main {
      padding-top: 88px;
      padding-bottom: 4rem;
      max-width: 860px;
      margin: 0 auto;
      padding-left: 6%;
      padding-right: 6%;
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .stat-tile {
      flex: 1;
      background: var(--card);
      padding: 20px 24px;
      text-align: center;
    }

    .stat-n {
      font-size: 1.8rem;
      font-weight: 900;
      color: #60a5fa;
      margin-bottom: 4px;
      line-height: 1;
    }

    .stat-cost { color: #fbbf24; }

    .stat-l {
      font-size: 0.74rem;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── HISTORY CARDS ── */
    .h-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .h-card:hover {
      border-color: rgba(59,130,246,0.4);
      background: rgba(30,41,59,0.95);
    }

    .h-card-main { flex: 1; min-width: 0; }

    .h-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .h-icon { font-size: 1.1rem; flex-shrink: 0; }

    .h-query {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .h-time {
      font-size: 0.74rem;
      color: var(--sub);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .h-meta {
      font-size: 0.78rem;
      color: var(--sub);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .h-dot { color: rgba(148,163,184,0.4); }

    .cost-badge { color: #fbbf24; font-weight: 600; }

    .h-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .h-btn {
      padding: 6px 12px;
      border-radius: 7px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .h-btn.primary {
      background: rgba(37,99,235,0.15);
      border-color: rgba(37,99,235,0.4);
      color: #93c5fd;
    }

    .h-btn.primary:hover { background: rgba(37,99,235,0.28); }

    .h-btn.ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--sub);
    }

    .h-btn.ghost:hover { border-color: #94a3b8; color: var(--text); }

    .h-btn.danger {
      background: transparent;
      border-color: rgba(239,68,68,0.3);
      color: #f87171;
      padding: 6px 10px;
    }

    .h-btn.danger:hover { background: rgba(239,68,68,0.1); }

    /* ── PAGINATION ── */
    .pg-btn {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--sub);
      transition: all 0.15s;
    }

    .pg-btn:hover { border-color: var(--blue-light); color: var(--text); }
    .pg-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── EMPTY / LOADING ── */
    .empty-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .empty-msg a { color: #93c5fd; text-decoration: none; }

    /* ── SPINNER ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 64px; left: 0; right: 0; background: rgba(15,23,42,0.97); padding: 1.5rem 6%; gap: 1.2rem; backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); z-index: 99; }
      .hamburger { display: flex; }

      .stats-strip { flex-wrap: wrap; }
      .stat-tile { min-width: calc(50% - 1px); flex: none; }
      #statCostTile { min-width: 100%; }

      .h-card { flex-direction: column; align-items: flex-start; }
      .h-actions { width: 100%; justify-content: flex-start; }

      .main { padding-left: 4%; padding-right: 4%; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <a href="index.html" class="nav-logo">智拓客</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">找客户</a></li>
    <li><a href="dashboard.html" class="nav-primary">仪表盘</a></li>
    <li><a href="index.html" class="nav-email-btn" title="邮件发送配置（在找客户页第五步）">📬 邮件</a></li>
    <li class="nav-dropdown" id="navUserMenu">
      <button class="nav-user-btn" onclick="toggleUserMenu()" title="账户菜单">👤 ▾</button>
      <div class="nav-dropdown-menu" id="userDropdown">
        <button class="nav-dd-item danger" onclick="logout()">🚪 退出</button>
      </div>
    </li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- STATS STRIP -->
  <div class="stats-strip">
    <div class="stat-tile">
      <div class="stat-n" id="statSearches">—</div>
      <div class="stat-l">总搜索次数</div>
    </div>
    <div class="stat-tile">
      <div class="stat-n" id="statScraped">—</div>
      <div class="stat-l">已抓取公司</div>
    </div>
    <div class="stat-tile">
      <div class="stat-n" id="statQualified">—</div>
      <div class="stat-l">合格线索</div>
    </div>
    <div class="stat-tile">
      <div class="stat-n" id="statEmailsSent">—</div>
      <div class="stat-l">已发邮件</div>
    </div>
    <div class="stat-tile" id="statCostTile" style="display:none">
      <div class="stat-n stat-cost" id="statCost">—</div>
      <div class="stat-l">累计花费</div>
    </div>
  </div>

  <!-- ADMIN COST BREAKDOWN (admin only) -->
  <div id="costBreakdown" style="display:none;margin-bottom:24px;padding:14px 20px;background:rgba(30,41,59,0.6);border:1px solid rgba(251,191,36,0.15);border-radius:10px;font-size:0.8rem;color:var(--sub)">
    <span style="color:#fbbf24;font-weight:600;margin-right:10px">💰 成本拆解：</span>
    <span>Apify <strong id="bdApify" style="color:var(--text)">—</strong></span>
    <span style="margin:0 8px;opacity:0.4">·</span>
    <span>Anthropic (AI) <strong id="bdAnthropic" style="color:var(--text)">—</strong></span>
    <span style="margin:0 8px;opacity:0.4">·</span>
    <span>Firecrawl <strong id="bdFirecrawl" style="color:var(--text)">—</strong></span>
    <span style="margin:0 8px;opacity:0.4">·</span>
    <span>本月 <strong id="bdMonth" style="color:#fbbf24">—</strong></span>
  </div>

  <!-- SECTION HEADER + FILTER -->
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
    <h2 style="font-size:1rem; font-weight:700;">📋 历史搜索记录</h2>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <input id="filterInput" type="text" placeholder="🔍 按关键词过滤…"
        style="padding:7px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.84rem; width:220px; font-family:inherit; outline:none;"
        oninput="applyFilter(this.value)">
      <a href="index.html"
        style="display:inline-flex; align-items:center; padding:7px 16px; background:var(--blue); color:#fff; border-radius:8px; font-size:0.84rem; font-weight:600; text-decoration:none; transition:background 0.15s;"
        onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='var(--blue)'">
        + 新建搜索
      </a>
    </div>
  </div>

  <div id="countLine" style="font-size:0.78rem; color:var(--sub); margin-bottom:14px;"></div>

  <!-- HISTORY LIST -->
  <div id="histList">
    <div class="empty-msg">
      <span class="spinner" style="display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px"></span>
      加载中…
    </div>
  </div>

  <!-- PAGINATION -->
  <div id="pagination" style="display:flex; justify-content:center; gap:8px; margin-top:20px; flex-wrap:wrap;"></div>

</div>

<!-- FOOTER -->
<footer style="background:#070e1a;border-top:1px solid var(--border);padding:2rem 6%;text-align:center;color:#475569;font-size:0.8rem;margin-top:4rem">
  智拓客 © 2026 · 专为中国建材工厂打造的海外客户开发平台
</footer>

<script>
  const PAGE_SIZE = 20;
  const token = localStorage.getItem('leadgen_accessToken');
  let _allHistory = [];
  let _filtered   = [];
  let _page       = 1;
  let _isAdmin    = false;

  function toggleUserMenu() {
    document.getElementById('userDropdown').classList.toggle('open');
  }
  function logout() {
    localStorage.removeItem('leadgen_accessToken');
    location.href = 'landing.html';
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('#navUserMenu')) {
      document.getElementById('userDropdown')?.classList.remove('open');
    }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('userDropdown')?.classList.remove('open');
  });

  // Hamburger
  (function() {
    const hb = document.getElementById('hamburger');
    const nl = document.getElementById('navLinks');
    if (hb && nl) {
      hb.addEventListener('click', () => nl.classList.toggle('open'));
      nl.querySelectorAll('a, button').forEach(x => x.addEventListener('click', () => nl.classList.remove('open')));
    }
  })();

  // ── Time-ago helper ──
  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 60) return m <= 1 ? '刚刚' : m + '分钟前';
    const h = Math.floor(m / 60);
    if (h < 24) return h + '小时前';
    const d = Math.floor(h / 24);
    if (d < 30) return d + '天前';
    return Math.floor(d / 30) + '个月前';
  }

  // ── Check admin status ──
  async function checkAdmin() {
    if (!token) return;
    try {
      const r = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + token } });
      const d = await r.json();
      _isAdmin = !!d.isAdmin;
      if (_isAdmin) {
        document.getElementById('statCostTile').style.display = '';
        document.getElementById('costBreakdown').style.display = '';
        document.querySelectorAll('.admin-only').forEach(function(el) { el.style.display = ''; });
      }
    } catch (e) {}
  }

  // ── Load history ──
  async function loadHistory() {
    if (!token) {
      document.getElementById('histList').innerHTML =
        '<div class="empty-msg">请先<a href="index.html">登录</a>再查看历史</div>';
      return;
    }
    try {
      const r = await fetch('/api/history', { headers: { Authorization: 'Bearer ' + token } });
      const d = await r.json();
      _allHistory = d.history || [];

      // Compute stats
      var totalScraped   = _allHistory.reduce(function(s, x) { return s + (x.total_scraped   || 0); }, 0);
      var totalQualified = _allHistory.reduce(function(s, x) { return s + (x.total_qualified || 0); }, 0);
      var totalCost      = _allHistory.reduce(function(s, x) { return s + (x.total_cost_usd  || 0); }, 0);
      var totalApify     = _allHistory.reduce(function(s, x) { return s + (x.apify_cost_usd     || 0); }, 0);
      var totalAnthropic = _allHistory.reduce(function(s, x) { return s + (x.anthropic_cost_usd || 0); }, 0);
      var totalFirecrawl = totalCost - totalApify - totalAnthropic;

      document.getElementById('statSearches').textContent  = _allHistory.length;
      document.getElementById('statScraped').textContent   = totalScraped;
      document.getElementById('statQualified').textContent = totalQualified;
      document.getElementById('statEmailsSent').textContent = d.emailsSent ?? '—';
      document.getElementById('statCost').textContent      = '$' + totalCost.toFixed(2);
      document.getElementById('bdApify').textContent       = '$' + totalApify.toFixed(4);
      document.getElementById('bdAnthropic').textContent   = '$' + totalAnthropic.toFixed(4);
      document.getElementById('bdFirecrawl').textContent   = '$' + Math.max(0, totalFirecrawl).toFixed(4);

      // Month cost
      var monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
      var monthCost  = _allHistory.filter(function(x) { return x.created_at >= monthStart; })
                                  .reduce(function(s, x) { return s + (x.total_cost_usd || 0); }, 0);
      document.getElementById('bdMonth').textContent = '$' + monthCost.toFixed(2);

      _filtered = _allHistory.slice();
      renderPage(1);
    } catch (e) {
      document.getElementById('histList').innerHTML =
        '<div class="empty-msg">加载失败，请刷新重试</div>';
    }
  }

  // ── Filter ──
  function applyFilter(q) {
    var v = q.trim().toLowerCase();
    _filtered = v
      ? _allHistory.filter(function(x) {
          return (x.query    || '').toLowerCase().includes(v) ||
                 (x.location || '').toLowerCase().includes(v);
        })
      : _allHistory.slice();
    renderPage(1);
  }

  // ── Render page ──
  function renderPage(page) {
    _page = page;
    var start = (page - 1) * PAGE_SIZE;
    var slice = _filtered.slice(start, start + PAGE_SIZE);
    var total = _filtered.length;

    var countLine = document.getElementById('countLine');
    if (total) {
      countLine.textContent = '共 ' + total + ' 条记录' +
        (_allHistory.length !== total ? '（筛选自 ' + _allHistory.length + ' 条）' : '');
    } else {
      countLine.textContent = '';
    }

    var list = document.getElementById('histList');
    if (!slice.length) {
      list.innerHTML = '<div class="empty-msg">暂无搜索记录，<a href="index.html">立即开始拓客 →</a></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    list.innerHTML = slice.map(function(r) {
      var cost   = r.total_cost_usd != null ? Number(r.total_cost_usd).toFixed(4) : '0.0000';
      var safeQ   = (r.query    || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      var safeLoc = (r.location || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      var adminDisplay = _isAdmin ? '' : 'none';
      return '<div class="h-card" data-id="' + r.id + '" onclick="viewSearch(\'' + r.id + '\')">' +
        '<div class="h-card-main">' +
          '<div class="h-card-top">' +
            '<span class="h-icon">🔍</span>' +
            '<div class="h-query" title="' + (r.query || '') + '">' + (r.query || '(无关键词)') + '</div>' +
            '<div class="h-time">' + timeAgo(r.created_at) + '</div>' +
          '</div>' +
          '<div class="h-meta">' +
            '<span>📍 ' + (r.location || '—') + '</span>' +
            '<span class="h-dot">·</span>' +
            '<span>抓取 ' + (r.total_scraped || 0) + ' 条</span>' +
            '<span class="h-dot">·</span>' +
            '<span>合格 ' + (r.total_qualified || 0) + ' 条</span>' +
            '<span class="h-dot admin-only" style="display:' + adminDisplay + '">·</span>' +
            '<span class="admin-only cost-badge" style="display:' + adminDisplay + '">💰 $' + cost + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="h-actions" onclick="event.stopPropagation()">' +
          '<button class="h-btn primary" onclick="viewSearch(\'' + r.id + '\')">👁 查看线索</button>' +
          '<button class="h-btn ghost"   onclick="rerunSearch(\'' + safeQ + '\',\'' + safeLoc + '\')">🔄 重新搜</button>' +
          '<button class="h-btn danger"  onclick="deleteSearch(\'' + r.id + '\',this)">🗑</button>' +
        '</div>' +
      '</div>';
    }).join('');

    // Pagination
    var pages = Math.ceil(total / PAGE_SIZE);
    var pg = document.getElementById('pagination');
    if (pages <= 1) { pg.innerHTML = ''; return; }
    pg.innerHTML = Array.from({ length: pages }, function(_, i) { return i + 1; }).map(function(p) {
      return '<button class="pg-btn' + (p === page ? ' active' : '') + '" onclick="renderPage(' + p + ')">' + p + '</button>';
    }).join('');
  }

  // ── Navigation actions ──
  function viewSearch(id) {
    window.location.href = 'index.html?search=' + id;
  }

  function rerunSearch(query, loc) {
    window.location.href = 'index.html?query=' + encodeURIComponent(query) + '&location=' + encodeURIComponent(loc);
  }

  async function deleteSearch(id, btn) {
    if (!confirm('确定要删除这条搜索记录及其所有线索吗？此操作不可撤销。')) return;
    btn.disabled = true;
    btn.textContent = '…';
    try {
      var r = await fetch('/api/history/' + id, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token },
      });
      var d = await r.json();
      if (!d.success) throw new Error(d.error || '删除失败');

      // Remove card from DOM and data arrays
      var card = document.querySelector('.h-card[data-id="' + id + '"]');
      if (card) card.remove();
      _allHistory = _allHistory.filter(function(x) { return x.id !== id; });
      _filtered   = _filtered.filter(function(x) { return x.id !== id; });

      // Refresh stats
      var totalScraped   = _allHistory.reduce(function(s, x) { return s + (x.total_scraped   || 0); }, 0);
      var totalQualified = _allHistory.reduce(function(s, x) { return s + (x.total_qualified || 0); }, 0);
      var totalCost      = _allHistory.reduce(function(s, x) { return s + (x.total_cost_usd  || 0); }, 0);
      document.getElementById('statSearches').textContent  = _allHistory.length;
      document.getElementById('statScraped').textContent   = totalScraped;
      document.getElementById('statQualified').textContent = totalQualified;
      document.getElementById('statCost').textContent      = '$' + totalCost.toFixed(2);
      document.getElementById('countLine').textContent =
        _filtered.length ? '共 ' + _filtered.length + ' 条记录' : '';
    } catch (e) {
      alert('删除失败：' + e.message);
      btn.disabled = false;
      btn.textContent = '🗑';
    }
  }

  // ── Init ──
  checkAdmin().then(function() { loadHistory(); });
</script>
</body>
</html>
